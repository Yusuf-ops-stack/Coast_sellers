<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Products</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Poppins;
  background:#f4f6fb;
}

.header{
  background:linear-gradient(135deg,#2563eb,#14b8a6);
  color:white;
  padding:0px;
  text-align:center;
  font-weight:600;
}

.container{
  max-width:1000px;
  margin:auto;
  padding:20px;
}

.card{
  background:white;
  padding:15px;
  margin-bottom:15px;
  border-radius:12px;
  display:flex;
  gap:15px;
  align-items:center;
  box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

.card img{
  width:90px;
  height:90px;
  object-fit:cover;
  border-radius:10px;
}

.info{ flex:1; }

.actions button{
  margin-left:5px;
  padding:8px 10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.view{ background:#2563eb; color:white; }
.delete{ background:#ef4444; color:white; }

/* MODAL */
.modal{
  position:fixed;
  top:0; left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-content{
  background:white;
  width:90%;
  max-width:500px;
  padding:20px;
  border-radius:12px;
}

.modal-content input,
.modal-content textarea{
  width:100%;
  padding:10px;
  margin-top:8px;
  margin-bottom:10px;
  border:1px solid #ddd;
  border-radius:8px;
}

.modal-actions{
  display:flex;
  justify-content:space-between;
  gap:10px;
}

.save{
  background:#10b981;
  color:white;
  padding:10px;
  border:none;
  border-radius:8px;
  flex:1;
}

.close{
  background:#6b7280;
  color:white;
  padding:10px;
  border:none;
  border-radius:8px;
  flex:1;
}
.image-box{
  position:relative;
}

.image-box img{
  width:70px;
  height:70px;
  object-fit:cover;
  border-radius:8px;
}

.image-box button{
  position:absolute;
  top:-6px;
  right:-6px;
  background:red;
  color:white;
  border:none;
  border-radius:50%;
  width:18px;
  height:18px;
  font-size:12px;
  cursor:pointer;
}
.back-btn{
  display:flex;
  align-items:center;
  gap:8px;
  padding:10px 14px;
  border:none;
  border-radius:12px;
  background:linear-gradient(135deg,#2563eb,#14b8a6);
  color:white;
  font-family:Poppins, sans-serif;
  font-size:14px;
  cursor:pointer;
  box-shadow:0 6px 15px rgba(0,0,0,0.15);
  transition:0.2s ease;
margin-bottom: -20px;
}

.back-btn i{
  font-size:16px;
}

.back-btn:hover{
  transform:translateX(-3px);
  box-shadow:0 8px 20px rgba(0,0,0,0.25);
}

.back-btn:active{
  transform:scale(0.95);
}

</style>
</head>

<body>


<div class="header">
  <button class="back-btn" onclick="history.back()">
  <i class="fa-solid fa-arrow-left"></i>
  Back
</button>
  🛍 My Products Dashboard
</div>
<div style="max-width:1000px;margin:20px auto;padding:0 20px; position:relative;">

  <i class="fa-solid fa-magnifying-glass" 
     style="position:absolute; left:35px; top:50%; transform:translateY(-50%); color:#888;"></i>

  <input 
    type="text" 
    id="searchInput" 
    placeholder="Search product by name..."
    oninput="render()"
    style="
      width:100%;
      padding:12px 12px 12px 40px;
      border-radius:10px;
      border:1px solid #ddd;
      outline:none;
      font-family:Poppins;
    "
  >
</div>



<div class="container" id="list"></div>

<!-- MODAL -->
<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">

    <h3>Edit Product</h3>

    <input type="text" id="editName" placeholder="Product name">
    <input type="number" id="editPrice" placeholder="Price">
    <input type="number" id="editDiscount" placeholder="Discount">
    <textarea id="editDesc" placeholder="Description"></textarea>

    <label><b>Product Images</b></label>

    <!-- existing images -->
    <div id="imageList" style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;"></div>

    <!-- add new images -->
    <input type="file" id="addImages" multiple>

    <div class="modal-actions">
      <button class="save" onclick="saveEdit()">Save & Repost</button>
      <button class="close" onclick="closeModal()">Close</button>
    </div>

  </div>
</div>


<script>
  let products = JSON.parse(localStorage.getItem("products")) || [];
let currentId = null;
let currentImages = [];

// OPEN EDIT MODAL
function openEdit(id){

  const product = products.find(p => String(p.id) === String(id));
  if(!product) return alert("Product not found");

  currentId = id;

  document.getElementById("editName").value = product.name || "";
  document.getElementById("editPrice").value = product.price || "";
  document.getElementById("editDiscount").value = product.discount || "";
  document.getElementById("editDesc").value = product.description || "";

  currentImages = product.images ? [...product.images] : [];

  renderImages();

  document.getElementById("modal").style.display = "flex";
}

// SHOW IMAGES
function renderImages(){
  const box = document.getElementById("imageList");
  box.innerHTML = "";

  currentImages.forEach((img, index) => {

    const div = document.createElement("div");
    div.className = "image-box";

    div.innerHTML = `
      <img src="${img}">
      <button onclick="removeImage(${index})">×</button>
    `;

    box.appendChild(div);
  });
}

// REMOVE IMAGE
function removeImage(index){
  currentImages.splice(index, 1);
  renderImages();
}

// ADD NEW IMAGES
document.getElementById("addImages").addEventListener("change", function(){

  const files = Array.from(this.files);

  files.forEach(file => {
    const reader = new FileReader();

    reader.onload = e => {
      currentImages.push(e.target.result);
      renderImages();
    };

    reader.readAsDataURL(file);
  });

});

// SAVE + REPOST (FIXED VERSION)
function saveEdit(){

  const index = products.findIndex(p => String(p.id) === String(currentId));

  if(index === -1){
    alert("Product not found");
    return;
  }

  // UPDATE PRODUCT PROPERLY
  products[index] = {
    ...products[index],
    name: document.getElementById("editName").value,
    price: document.getElementById("editPrice").value,
    discount: document.getElementById("editDiscount").value,
    description: document.getElementById("editDesc").value,
    images: currentImages,
    updatedAt: new Date().toLocaleString()
  };

  localStorage.setItem("products", JSON.stringify(products));

  closeModal();
  render();

  alert("Product updated & reposted successfully!");
}

// CLOSE MODAL
function closeModal(){
  document.getElementById("modal").style.display = "none";
}

// DELETE PRODUCT
function deleteProduct(id){

  if(!confirm("Delete product?")) return;

  products = products.filter(p => String(p.id) !== String(id));

  localStorage.setItem("products", JSON.stringify(products));

  render();
}

// RENDER LIST (IMPORTANT - ADD THIS IF MISSING)
function render(){

  const list = document.getElementById("list");
  list.innerHTML = "";

  const searchValue = document.getElementById("searchInput")?.value.toLowerCase() || "";

  let filtered = products.filter(p => 
    p.name.toLowerCase().includes(searchValue)
  );

  if(filtered.length === 0){
    list.innerHTML = "<p style='text-align:center'>No matching products found</p>";
    return;
  }

  filtered.forEach((p, index) => {

    const img = (p.images && p.images.length) ? p.images[0] : "";

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <span style="
        position:absolute;
        margin-left:-10px;
        margin-top:-10px;
        background:#2563eb;
        color:white;
        width:25px;
        height:25px;
        display:flex;
        align-items:center;
        justify-content:center;
        border-radius:50%;
        font-size:12px;
      ">${index + 1}</span>

      <img src="${img}">
      
      <div class="info">
        <h3>${p.name}</h3>
        <p>KSh ${p.price}</p>
      </div>

      <div class="actions">
        <button class="view" onclick="openEdit('${p.id}')">View</button>
        <button class="delete" onclick="deleteProduct('${p.id}')">Delete</button>
      </div>
    `;

    list.appendChild(div);
  });
}

render();

</script>

</body>
</html>
