<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Seller Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#2563eb">

<style>
:root{
  --bg:#0f172a;
  --card:#111827;
  --text:#f1f5f9;
  --muted:#94a3b8;
  --accent:#3b82f6;
  --sidebar:#0b1220;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Poppins, sans-serif;
}

body{
  display:flex;
  min-height:100vh;
  background:var(--bg);
  color:var(--text);
}

/* SIDEBAR */
.sidebar{
  width:260px;
  background:var(--sidebar);
  padding:20px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
}

.logo{
  font-size:20px;
  font-weight:600;
  margin-bottom:20px;
  color:var(--accent);
}

.features h3{
  margin:10px 0;
  font-size:14px;
  color:var(--muted);
}

.features ul{
  list-style:none;
}

.features ul li{
  padding:10px;
  margin:6px 0;
  background:#111827;
  border-radius:10px;
  font-size:14px;
  display:flex;
  gap:10px;
  align-items:center;
}

.features ul li i{
  color:var(--accent);
}

/* INSTALL BUTTON */
.install-btn{
  background:var(--accent);
  border:none;
  padding:12px;
  color:white;
  font-size:14px;
  border-radius:10px;
  cursor:pointer;
  width:100%;
  margin-top:20px;
  transition:0.3s;
}

.install-btn:hover{
  background:#2563eb;
}

/* MAIN CONTENT */
.main{
  flex:1;
  padding:30px;
}

.card{
  background:var(--card);
  padding:20px;
  border-radius:15px;
  margin-bottom:20px;
}

.card h2{
  margin-bottom:10px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:15px;
}

.box{
  background:#1f2937;
  padding:15px;
  border-radius:12px;
}

@media(max-width:768px){
  .sidebar{
    width:200px;
  }
}
.features ul li i{
  width:22px;
  text-align:center;
  color:#3b82f6;
  margin-right:8px;
}
/* HIDE MENU BUTTON ON DESKTOP */
.mobile-topbar{
  display:none;
  align-items:center;
  gap:10px;
  margin-bottom:20px;
}

.menu-btn{
  background:#111827;
  border:none;
  color:white;
  padding:10px 12px;
  border-radius:10px;
  cursor:pointer;
  font-size:18px;
}

/* MOBILE SLIDE MENU */
@media(max-width:768px){

  body{
    flex-direction:column;
  }

  .mobile-topbar{
    display:flex;
  }

  .sidebar{
    position:fixed;
    top:0;
    left:-260px;
    height:100%;
    z-index:999;
    transition:0.3s;
    box-shadow:5px 0 20px rgba(0,0,0,0.3);
  }

  .sidebar.active{
    left:0;
  }

  .main{
    width:100%;
    padding:15px;
  }

  /* DARK OVERLAY */
  .overlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.4);
    display:none;
    z-index:998;
  }

  .overlay.active{
    display:block;
  }
}
.features ul li{
  cursor:pointer;
  transition:0.2s;
}

.features ul li:hover{
  background:#1f2937;
  transform:translateX(5px);
}
.features ul li{
  padding:0;
}

.features ul li a{
  display:flex;
  align-items:center;
  gap:10px;
  padding:10px;
  text-decoration:none;
  color:inherit;
  border-radius:10px;
  width:100%;
}

.features ul li a:hover{
  background:#1f2937;
}
.sidebar{
  pointer-events:auto;
}

.sidebar.active{
  pointer-events:auto;
}
.overlay{
  pointer-events:none;
}

.overlay.active{
  pointer-events:auto;
}
.sidebar{
  z-index:1000;
}

.overlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.4);
  display:none;
}

.overlay.active{
  display:block;
}


</style>
</head>

<body>
  <div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<div class="mobile-topbar">
  <button class="menu-btn" onclick="toggleMenu()">
    <i class="fa-solid fa-bars"></i>
  </button>

  <h2>Seller Dashboard</h2>
</div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <div>
    <div class="logo">
      <i class="fa-solid fa-store"></i> Seller Panel
    </div>

<div class="features">
  <h3>Recommended Features</h3>

  <ul>
    <li><a href="/profile page/index.html"><i class="fa-solid fa-user"></i> Profile</a></li>
    <li><a href="/products page/index.html"><i class="fa-solid fa-box-open"></i> My Products</a></li>
    <li><a href="/orders page/index.html"><i class="fa-solid fa-cart-shopping"></i> Orders</a></li>
    <li><a href="/messages page/index.html"><i class="fa-solid fa-comments"></i> Buyer Chat System</a></li>
    <li><a href="/notifications page/index.html"><i class="fa-solid fa-bell"></i> Notifications</a></li>
    <li><a href="/upload page/index.html"><i class="fa-solid fa-cloud-arrow-up"></i> Upload</a></li>
  </ul>
</div>



  </div>

  <button class="install-btn" id="installBtn" style="display:none;">
  <i class="fa-solid fa-download"></i> Install App
</button>

</div>

<!-- MAIN -->
<div class="main">

  <div class="card">
    <h2>Welcome Seller 👋</h2>
    <p>Manage your products, track orders, and grow your business from one dashboard.</p>
  </div>

 <div class="grid">
  <div class="box">
    <h3>Today Sales</h3>
    <p>KES 0</p>
  </div>

  <div class="box">
    <h3>Orders</h3>
    <p>0 Active</p>
  </div>

  <div class="box">
    <h3>Products</h3>
    <p id="productCount">0 Listed</p>
  </div>
</div>


</div>

<script>
let deferredPrompt = null;
const installBtn = document.getElementById("installBtn");

installBtn.style.display = "none";

window.addEventListener("beforeinstallprompt", (e) => {
  console.log("INSTALL EVENT FIRED ✔");

  e.preventDefault();
  deferredPrompt = e;

  installBtn.style.display = "block";
});

installBtn.addEventListener("click", async () => {
  if (!deferredPrompt) {
    alert("App not installable yet. Open in Chrome.");
    return;
  }

  deferredPrompt.prompt();

  const result = await deferredPrompt.userChoice;

  console.log(result.outcome);

  deferredPrompt = null;
  installBtn.style.display = "none";
});

window.addEventListener("appinstalled", () => {
  installBtn.style.display = "none";
});


function loadDashboardData(){

  let products = JSON.parse(localStorage.getItem("products")) || [];

  // PRODUCTS COUNT
  document.getElementById("productCount").innerText = 
    products.length + " Listed";

  // OPTIONAL: You can also calculate earnings later
  // let earnings = products.reduce((sum, p) => sum + Number(p.price || 0), 0);
}

loadDashboardData();
function toggleMenu(){
  const sidebar = document.getElementById("sidebar");
  const overlay = document.getElementById("overlay");

  sidebar.classList.toggle("active");
  overlay.classList.toggle("active");
}
function goTo(page){
  window.location.href = page;
}
document.querySelectorAll(".features a").forEach(link => {
  link.addEventListener("click", () => {
    closeMenu();
  });
});
function closeMenu(){
  document.getElementById("sidebar").classList.remove("active");
  document.getElementById("overlay").classList.remove("active");
}
function toggleMenu(){
  document.getElementById("sidebar").classList.toggle("active");
  document.getElementById("overlay").classList.toggle("active");
}
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./sw.js")
      .then(() => console.log("Service Worker Registered"))
      .catch(err => console.log("SW Error:", err));
  });
}

</script>

</body>
</html>
