<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CoastMall Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
  margin:0;
  font-family:Poppins;
  background:linear-gradient(135deg,#f4f6f9,#e9eef5);
  padding-bottom:90px;
  -webkit-tap-highlight-color: transparent;
}

/* HEADER */
.header{
  background:linear-gradient(135deg,#0f172a,#1e293b);
  color:white;
  padding:18px;
  text-align:center;
  font-size:18px;
  font-weight:600;
  position:relative;
}

/* MENU BUTTON */
.menu-btn{
  position:absolute;
  left:15px;
  top:50%;
  transform:translateY(-50%);
  font-size:22px;
  cursor:pointer;
}

/* SIDE MENU (MOBILE FRIENDLY) */
.sidebar{
  position:fixed;
  top:0;
  left:-100%;
  width:80%;
  max-width:300px;
  height:100%;
  background:#0f172a;
  color:white;
  padding:20px;
  transition:0.3s ease;
  z-index:10000;
  overflow-y:auto;
}

/* FULL SCREEN MENU ON VERY SMALL DEVICES */
@media (max-width: 480px){
  .sidebar{
    width:100%;
    max-width:none;
  }
}

.sidebar h3{
  margin-top:10px;
  font-size:18px;
}

.sidebar a,
.sidebar button{
  display:block;
  width:100%;
  padding:14px;
  margin-top:12px;
  border-radius:12px;
  border:none;
  font-size:15px;
  font-family:Poppins;
  cursor:pointer;
}

.sidebar a{
  background:#1e293b;
  color:white;
  text-decoration:none;
}

.sidebar button{
  background:#2563eb;
  color:white;
}

/* OVERLAY */
.overlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
  display:none;
  z-index:9999;
}

/* STATS */
.stats{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
  padding:15px;
}

/* MOBILE STACK */
@media (max-width: 600px){
  .stats{
    grid-template-columns:1fr;
  }
}

.card{
  background:white;
  padding:16px;
  border-radius:16px;
  box-shadow:0 6px 15px rgba(0,0,0,0.08);
}

.card h4{margin:0;font-size:12px;color:#777;}
.card p{font-size:20px;font-weight:700;margin-top:8px;}

/* ACTIONS */
.actions{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
  padding:0 15px;
}

@media (max-width:600px){
  .actions{
    grid-template-columns:1fr;
  }
}

.action{
  background:white;
  padding:18px;
  border-radius:16px;
  text-align:center;
  cursor:pointer;
  font-weight:500;
}

/* BOTTOM NAV */
.bottom-nav{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  height:70px;
  background:white;
  display:flex;
  justify-content:space-around;
  align-items:center;
  box-shadow:0 -2px 15px rgba(0,0,0,0.08);
  border-top-left-radius:18px;
  border-top-right-radius:18px;
  padding-bottom: env(safe-area-inset-bottom);
}

.nav-item{
  text-align:center;
  font-size:10px;
  color:#666;
  flex:1;
  cursor:pointer;
}

.nav-item i{
  display:block;
  font-size:18px;
  margin-bottom:3px;
}

/* TOUCH IMPROVEMENTS */
button, .action, .nav-item, a{
  -webkit-tap-highlight-color: transparent;
}
</style>
</head>

<body>

<!-- OVERLAY -->
<div class="overlay" id="overlay" onclick="closeMenu()"></div>

<!-- SIDE MENU -->
<div class="sidebar" id="sidebar">
  <h3>📦 Menu</h3>

  <a href="#">🏠 Home</a>
  <a href="#">📦 Orders</a>
  <a href="#">➕ Upload</a>
  <a href="#">🛍 Products</a>
  <a href="#">💬 Messages</a>

  <button onclick="alert('Install feature here')">📲 Install App</button>
  <button onclick="closeMenu()">Close</button>
</div>

<!-- HEADER -->
<div class="header">
  <span class="menu-btn" onclick="openMenu()">
    <i class="fa fa-bars"></i>
  </span>
  📦 CoastMall Dashboard
</div>

<!-- STATS -->
<div class="stats">
  <div class="card"><h4>Total Orders</h4><p>0</p></div>
  <div class="card"><h4>Pending</h4><p>0</p></div>
  <div class="card"><h4>Delivered</h4><p>0</p></div>
  <div class="card"><h4>Revenue</h4><p>0</p></div>
</div>

<!-- ACTIONS -->
<div class="actions">
  <div class="action">📦 Orders</div>
  <div class="action">➕ Upload</div>
  <div class="action">🛍 Products</div>
  <div class="action">💬 Messages</div>
</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <div class="nav-item"><i class="fa fa-home"></i>Home</div>
  <div class="nav-item"><i class="fa fa-box"></i>Orders</div>
  <div class="nav-item"><i class="fa fa-plus-circle"></i>Upload</div>
  <div class="nav-item"><i class="fa fa-comments"></i>Chat</div>
  <div class="nav-item"><i class="fa fa-bag-shopping"></i>Shop</div>
</div>

<script>
function openMenu(){
  document.getElementById("sidebar").style.left = "0";
  document.getElementById("overlay").style.display = "block";
}

function closeMenu(){
  document.getElementById("sidebar").style.left = "-100%";
  document.getElementById("overlay").style.display = "none";
}
</script>

</body>
</html>
