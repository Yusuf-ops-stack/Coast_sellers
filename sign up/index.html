<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sign Up</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Poppins;
  background:#0f172a;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card{
  background:#111827;
  padding:25px;
  border-radius:15px;
  width:320px;
}

h2{
  text-align:center;
  margin-bottom:15px;
}

input{
  width:100%;
  padding:12px;
  margin:8px 0;
  border:none;
  border-radius:10px;
  background:#1f2937;
  color:white;
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#3b82f6;
  color:white;
  cursor:pointer;
}

a{
  color:#3b82f6;
  text-decoration:none;
  font-size:13px;
}

p{
  text-align:center;
  margin-top:10px;
  font-size:13px;
  color:#94a3b8;
}
</style>
</head>

<body>
<div id="googleBox" style="display:none; text-align:center; margin-bottom:15px;">
  <img id="gPhoto" src="" style="width:60px; height:60px; border-radius:50%; margin-bottom:10px;">
  <h3 id="gName"></h3>
  <p id="gEmail" style="font-size:12px; color:#94a3b8;"></p>

  <button onclick="continueGoogle()" style="background:#22c55e;">
    Continue as this user
  </button>
</div>

<div class="card">
  <h2>Create Account</h2>

  <input type="text" id="name" placeholder="Full Name">
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">

  <button onclick="signup()">Sign Up</button>
<button onclick="googleSignIn()" style="background:#fff; color:#000; display:flex; align-items:center; justify-content:center; gap:10px;">
  <img src="https://cdn-icons-png.flaticon.com/512/281/281764.png" width="18">
  Continue with Google
</button>
  <p>Already have an account? <a href="/sign in/index.html">Login</a></p>
</div>


<script type="module">

// Firebase imports
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { 
  getAuth, 
  createUserWithEmailAndPassword, 
  updateProfile,
  GoogleAuthProvider,
  signInWithPopup
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyD7DFAUxSfpGWmVegVY38J6khc9o5JE3LA",
  authDomain: "coastmall-sellers.firebaseapp.com",
  projectId: "coastmall-sellers",
  storageBucket: "coastmall-sellers.firebasestorage.app",
  messagingSenderId: "360613421614",
  appId: "1:360613421614:web:6912f4a5a131deb1cef5bf",
  measurementId: "G-TZV64DSXWT"
};

// Init
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// Email signup
window.signup = function(){

  let name = document.getElementById("name").value;
  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  if(!name || !email || !password){
    alert("Fill all fields");
    return;
  }

  createUserWithEmailAndPassword(auth, email, password)
  .then((userCredential) => {

    const user = userCredential.user;

    updateProfile(user, {
      displayName: name
    });

    alert("Account created successfully!");
    window.location.href = "index.html"; // 🔥 better UX (auto login)

  })
  .catch((error) => {
    alert(error.message);
  });
}

// 🔥 Google Sign-In
window.googleSignIn = function(){

  const provider = new GoogleAuthProvider();

  signInWithPopup(auth, provider)
  .then((result) => {

    const user = result.user;

    // Save user session
    localStorage.setItem("loggedUser", JSON.stringify({
      uid: user.uid,
      name: user.displayName,
      email: user.email,
      photo: user.photoURL
    }));

    alert("Welcome " + user.displayName);

    // 🔥 BYPASS LOGIN PAGE
    window.location.href = "/profile page/index.html";

  })
  .catch((error) => {
    alert(error.message);
  });
}

</script>


</body>
</html>
