<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Upload Product</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root{
  --bg:#0f172a;
  --card:#111827;
  --text:#f1f5f9;
  --muted:#94a3b8;
  --accent:#3b82f6;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Poppins, sans-serif;
}

body{
  background:var(--bg);
  color:var(--text);
  padding:20px;
}

/* TOP BAR */
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.topbar h2{
  font-size:20px;
}

.back-btn{
  background:var(--card);
  border:none;
  padding:10px 15px;
  color:var(--text);
  border-radius:10px;
  cursor:pointer;
}

/* FORM CARD */
.card{
  background:var(--card);
  padding:20px;
  border-radius:15px;
  max-width:600px;
  margin:auto;
}

label{
  font-size:13px;
  color:var(--muted);
  display:block;
  margin-top:10px;
}

input, textarea{
  width:100%;
  padding:12px;
  margin-top:5px;
  border:none;
  border-radius:10px;
  background:#1f2937;
  color:var(--text);
  outline:none;
}

textarea{
  resize:none;
  height:100px;
}

/* IMAGE PREVIEW */
.preview{
  width:100%;
  height:200px;
  background:#1f2937;
  border-radius:12px;
  margin-top:10px;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
}

.preview img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* BUTTON */
.btn{
  margin-top:15px;
  width:100%;
  padding:12px;
  background:var(--accent);
  border:none;
  color:white;
  border-radius:10px;
  cursor:pointer;
  font-size:15px;
}

.btn:hover{
  background:#2563eb;
}
.preview{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:5px;
  height:auto;
  min-height:200px;
  padding:5px;
}

.preview img{
  width:100%;
  height:100px;
  object-fit:cover;
  border-radius:8px;
}
.back-btn{
  display:flex;
  align-items:center;
  gap:8px;
  padding:10px 14px;
  border:none;
  border-radius:12px;
  background:linear-gradient(135deg,#2563eb,#14b8a6);
  color:white;
  font-family:Poppins, sans-serif;
  font-size:14px;
  cursor:pointer;
  box-shadow:0 6px 15px rgba(0,0,0,0.15);
  transition:0.2s ease;
}

.back-btn i{
  font-size:16px;
}

.back-btn:hover{
  transform:translateX(-3px);
  box-shadow:0 8px 20px rgba(0,0,0,0.25);
}

.back-btn:active{
  transform:scale(0.95);
}

</style>
</head>

<body>

<div class="topbar">
<button class="back-btn" onclick="history.back()">
  <i class="fa-solid fa-arrow-left"></i>
  Back
</button>

  </button>

  <h2>Upload Product</h2>
</div>

<div class="card">

  <label>Product Image</label>
 <input type="file" id="imageInput" accept="image/*" multiple>
  <div class="preview" id="previewBox">
  <span style="color:#64748b;">Upload multiple images</span>
</div>


  <label>Product Name</label>
  <input type="text" id="name" placeholder="e.g. Nike Shoes">

  <label>Price (KES)</label>
  <input type="number" id="price" placeholder="e.g. 2500">

  <label>Discount (%)</label>
  <input type="number" id="discount" placeholder="e.g. 10">

  <label>Description</label>
  <textarea id="description" placeholder="Describe your product..."></textarea>

  <button class="btn" onclick="saveProduct()">
    <i class="fa fa-upload"></i> Upload Product
  </button>

</div>

<script>
// IMAGE PREVIEW
const imageInput = document.getElementById("imageInput");
const previewBox = document.getElementById("previewBox");

let images = [];

imageInput.addEventListener("change", function(){

  images = [];
  previewBox.innerHTML = "";

  const files = Array.from(this.files);

  files.forEach(file => {
    const reader = new FileReader();

    reader.onload = function(e){
      images.push(e.target.result);

      const img = document.createElement("img");
      img.src = e.target.result;
      previewBox.appendChild(img);
    };

    reader.readAsDataURL(file);
  });

});

// SAVE PRODUCT
function saveProduct(){

  const btn = document.querySelector(".btn");

  // START LOADING STATE
  btn.innerHTML = `<i class="fa fa-spinner fa-spin"></i> Uploading...`;
  btn.disabled = true;

  setTimeout(() => {

    const name = document.getElementById("name").value;
    const price = document.getElementById("price").value;
    const discount = document.getElementById("discount").value;
    const description = document.getElementById("description").value;

    if(!name || !price){
      alert("Please fill required fields");

      // RESET BUTTON
      btn.innerHTML = `<i class="fa fa-upload"></i> Upload Product`;
      btn.disabled = false;
      return;
    }

    if(images.length === 0){
      alert("Please upload at least one image");

      btn.innerHTML = `<i class="fa fa-upload"></i> Upload Product`;
      btn.disabled = false;
      return;
    }

    const product = {
      id: Date.now(),
      name,
      price,
      discount,
      description,
      images: images,
      time: new Date().toLocaleString()
    };

    let products = JSON.parse(localStorage.getItem("products")) || [];
    products.push(product);
    localStorage.setItem("products", JSON.stringify(products));

    alert("Product uploaded successfully!");

    // RESET FORM
    document.getElementById("name").value = "";
    document.getElementById("price").value = "";
    document.getElementById("discount").value = "";
    document.getElementById("description").value = "";

    images = [];
    imageInput.value = "";
    previewBox.innerHTML = `<span style="color:#64748b;">Upload multiple images</span>`;

    // RESET BUTTON
    btn.innerHTML = `<i class="fa fa-upload"></i> Upload Product`;
    btn.disabled = false;

  }, 800);
}
const btn = document.querySelector(".btn");

btn.innerHTML = `<i class="fa fa-spinner fa-spin"></i> Uploading...`;
btn.disabled = true;

setTimeout(() => {
  btn.innerHTML = `<i class="fa fa-upload"></i> Upload Product`;
  btn.disabled = false;
}, 800);

</script>

</body>
</html>
