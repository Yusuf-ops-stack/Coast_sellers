<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Poppins;
  background:#0f172a;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card{
  background:#111827;
  padding:25px;
  border-radius:15px;
  width:320px;
}

h2{
  text-align:center;
  margin-bottom:15px;
}

input{
  width:100%;
  padding:12px;
  margin:8px 0;
  border:none;
  border-radius:10px;
  background:#1f2937;
  color:white;
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#3b82f6;
  color:white;
  cursor:pointer;
}

a{
  color:#3b82f6;
  text-decoration:none;
  font-size:13px;
}

p{
  text-align:center;
  margin-top:10px;
  font-size:13px;
  color:#94a3b8;
}
</style>
</head>

<body>

<div class="card">
  <h2>Login</h2>

  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">

  <button onclick="login()">Login</button>

  <p>Don't have an account? <a href="/sign up/index.html">Sign Up</a></p>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyD7DFAUxSfpGWmVegVY38J6khc9o5JE3LA",
  authDomain: "coastmall-sellers.firebaseapp.com",
  projectId: "coastmall-sellers",
  storageBucket: "coastmall-sellers.firebasestorage.app",
  messagingSenderId: "360613421614",
  appId: "1:360613421614:web:6912f4a5a131deb1cef5bf"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// 🔥 Detect Google user
window.onload = function(){

  let googleUser = JSON.parse(localStorage.getItem("googleUser"));

  if(googleUser){

    // Show Google box
    document.getElementById("googleBox").style.display = "block";

    document.getElementById("gPhoto").src = googleUser.photo;
    document.getElementById("gName").innerText = googleUser.name;
    document.getElementById("gEmail").innerText = googleUser.email;

    // Hide manual inputs
    document.getElementById("email").style.display = "none";
    document.getElementById("password").style.display = "none";
  }

}

// 🔥 Continue with Google (no login again)
window.continueGoogle = function(){

  let googleUser = JSON.parse(localStorage.getItem("googleUser"));

  if(googleUser){

    localStorage.setItem("loggedUser", JSON.stringify(googleUser));

    // Clear temp data
    localStorage.removeItem("googleUser");

    alert("Welcome " + googleUser.name);

    window.location.href = "index.html";
  }
}

// Normal email login
window.login = function(){

  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  if(!email || !password){
    alert("Please fill all fields");
    return;
  }

  signInWithEmailAndPassword(auth, email, password)
  .then((userCredential) => {

    const user = userCredential.user;

    localStorage.setItem("loggedUser", JSON.stringify({
      uid: user.uid,
      email: user.email
    }));

    alert("Login successful!");
    window.location.href = "index.html";

  })
  .catch((error) => {
    alert(error.message);
  });
}

</script>



</body>
</html>
