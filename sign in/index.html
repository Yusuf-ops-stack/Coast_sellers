<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CoastMall Seller Login</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    *{box-sizing:border-box}
    body{margin:0;font-family:'Poppins',sans-serif;
      background:linear-gradient(135deg,#0d6efd,#4facfe);
      height:100vh; display:flex; align-items:center; justify-content:center;}
    .login-container{width:100%; max-width:380px; background:white; padding:30px; border-radius:16px;
      box-shadow:0 10px 30px rgba(0,0,0,0.2); text-align:center; animation:fadeIn 0.6s ease;}
    @keyframes fadeIn{from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)}}
    .logo{font-size:22px;font-weight:600;color:#0d6efd;margin-bottom:5px;}
    .subtitle{font-size:14px;color:#777;margin-bottom:20px;}
    input{width:100%; padding:12px; margin:10px 0; border-radius:8px; border:1px solid #ddd; font-size:14px;}
    .password-box{position:relative;}
    .password-box i{position:absolute; right:12px; top:50%; transform:translateY(-50%); cursor:pointer; color:#777;}
    .btn{width:100%; padding:12px; border:none; border-radius:8px; background:#0d6efd; color:white;
      font-size:15px; cursor:pointer; margin-top:10px;}
    .btn:hover{background:#0b5ed7;}
    .links{margin-top:15px; font-size:13px;}
    .links a{color:#0d6efd; text-decoration:none;}
    .footer{margin-top:20px; font-size:12px; color:#aaa;}
  </style>
</head>
<body>

<div class="login-container">
  <div class="logo">CoastMall</div>
  <div class="subtitle">Seller Login Portal</div>

  <form onsubmit="return loginUser()">
    <input type="email" id="email" placeholder="Email Address" required>

    <div class="password-box">
      <input type="password" id="password" placeholder="Password" required>
      <i class="fa-solid fa-eye" onclick="togglePassword()"></i>
    </div>

    <button class="btn">Login</button>
    <div id="loginError" class="error" style="display:none;color:red;font-size:12px;margin-top:5px;">
      Invalid email or password
    </div>
  </form>

  <div class="links">
    <a href="#">Forgot Password?</a><br>
    Don't have an account? <a href="/sign up/index.html">Register</a>
  </div>

  <div class="footer">© 2026 CoastMall</div>
</div>

<script>
function togglePassword(){
  const password = document.getElementById("password");
  const icon = document.querySelector(".password-box i");
  if(password.type === "password"){
    password.type = "text";
    icon.classList.replace("fa-eye","fa-eye-slash");
  } else {
    password.type = "password";
    icon.classList.replace("fa-eye-slash","fa-eye");
  }
}

// Auto-fill login form from localStorage
window.onload = function(){
  const sellerData = JSON.parse(localStorage.getItem("sellerData"));
  if(sellerData){
    document.getElementById("email").value = sellerData.email;
    document.getElementById("password").value = sellerData.password;
  }
}

// Login validation
function loginUser(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const sellerData = JSON.parse(localStorage.getItem("sellerData"));
  const loginError = document.getElementById("loginError");

  if(sellerData && email === sellerData.email && password === sellerData.password){
    loginError.style.display = "none";
    alert("Login successful!");
    // Redirect to dashboard (create dashboard.html)
    window.location.href = "/profile page/index.html";
    return false;
  } else {
    loginError.style.display = "block";
    return false;
  }
}
</script>

</body>
</html>
