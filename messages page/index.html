<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Seller Chat</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Poppins;
}

body{
  background:#0f172a;
  color:white;
  height:100vh;
  display:flex;
  flex-direction:column;
}

/* HEADER */
.header{
  background:#111827;
  padding:15px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  border-bottom:1px solid #1f2937;
}

.header .info{
  display:flex;
  flex-direction:column;
}

.header h3{
  font-size:16px;
}

.header small{
  color:#94a3b8;
  font-size:12px;
}

/* CHAT AREA */
.chat-box{
  flex:1;
  overflow-y:auto;
  padding:15px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

/* MESSAGE BUBBLES */
.msg{
  max-width:75%;
  padding:10px 12px;
  border-radius:12px;
  font-size:14px;
  position:relative;
  word-wrap:break-word;
}

.buyer{
  background:#3b82f6;
  align-self:flex-start;
  border-bottom-left-radius:2px;
}

.seller{
  background:#22c55e;
  align-self:flex-end;
  border-bottom-right-radius:2px;
}

/* TIME */
.time{
  font-size:10px;
  margin-top:5px;
  opacity:0.7;
}

/* INPUT BAR */
.input-box{
  display:flex;
  padding:10px;
  background:#111827;
  border-top:1px solid #1f2937;
}

input{
  flex:1;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#1f2937;
  color:white;
  outline:none;
}

button{
  margin-left:10px;
  padding:12px 15px;
  border:none;
  border-radius:10px;
  background:#3b82f6;
  color:white;
  cursor:pointer;
}

button:hover{
  background:#2563eb;
}

/* SCROLLBAR */
.chat-box::-webkit-scrollbar{
  width:5px;
}

.chat-box::-webkit-scrollbar-thumb{
  background:#334155;
  border-radius:10px;
}
.back-btn{
  display:flex;
  align-items:center;
  gap:8px;
  padding:10px 14px;
  border:none;
  border-radius:12px;
  background:linear-gradient(135deg,#2563eb,#14b8a6);
  color:white;
  font-family:Poppins, sans-serif;
  font-size:14px;
  cursor:pointer;
  box-shadow:0 6px 15px rgba(0,0,0,0.15);
  transition:0.2s ease;
}

.back-btn i{
  font-size:16px;
}

.back-btn:hover{
  transform:translateX(-3px);
  box-shadow:0 8px 20px rgba(0,0,0,0.25);
}

.back-btn:active{
  transform:scale(0.95);
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <button class="back-btn" onclick="history.back()">
  <i class="fa-solid fa-arrow-left"></i>
  Back
</button>

  <div class="info">
    <h3><i class="fa fa-user"></i> Buyer Chat</h3>
    <small id="orderInfo">Order ID: loading...</small>
  </div>

  <i class="fa fa-box" style="color:#3b82f6;"></i>
</div>

<!-- CHAT -->
<div class="chat-box" id="chatBox"></div>

<!-- INPUT -->
<div class="input-box">
  <input id="msg" placeholder="Type a message...">
  <button onclick="sendMsg()">
    <i class="fa fa-paper-plane"></i>
  </button>
</div>

<script>

let orderId = localStorage.getItem("activeOrder") || "demo1";

document.getElementById("orderInfo").innerText = "Order ID: " + orderId;

let chats = JSON.parse(localStorage.getItem("chats")) || {};

function render(){

  let box = document.getElementById("chatBox");
  box.innerHTML = "";

  let messages = chats[orderId] || [];

  messages.forEach(m => {

    let time = m.time || "";

    box.innerHTML += `
      <div class="msg ${m.sender}">
        ${m.message}
        <div class="time">${time}</div>
      </div>
    `;
  });

  box.scrollTop = box.scrollHeight;
}

function sendMsg(){

  let text = document.getElementById("msg").value;

  if(!text) return;

  if(!chats[orderId]){
    chats[orderId] = [];
  }

  chats[orderId].push({
    sender: "seller",
    message: text,
    time: new Date().toLocaleTimeString()
  });

  localStorage.setItem("chats", JSON.stringify(chats));

  document.getElementById("msg").value = "";

  render();
}

render();

</script>

</body>
</html>
