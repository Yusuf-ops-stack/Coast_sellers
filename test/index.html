<!DOCTYPE html>
<html>
<head>
<title>Create Order</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
<style>
body{
  font-family:Poppins;
  background:#0f172a;
  color:white;
  padding:20px;
}

input,button{
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:10px;
  border:none;
}

input{
  background:#1f2937;
  color:white;
}

button{
  background:#3b82f6;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<h2>Create Test Order</h2>

<input id="product" placeholder="Product Name">
<input id="price" type="number" placeholder="Price">
<input id="buyer" placeholder="Buyer Name">
<input id="phone" placeholder="Buyer Phone">

<button onclick="createOrder()">Create Order</button>

<script>
function createOrder(){

  let orders = JSON.parse(localStorage.getItem("orders")) || [];

  let order = {
    id: Date.now(),
    productName: document.getElementById("product").value,
    price: document.getElementById("price").value,
    buyerName: document.getElementById("buyer").value,
    buyerPhone: document.getElementById("phone").value,
    status: "Pending",
    time: new Date().toLocaleString()
  };

  orders.push(order);
  localStorage.setItem("orders", JSON.stringify(orders));

  alert("Order created!");
}
</script>

</body>
</html>
