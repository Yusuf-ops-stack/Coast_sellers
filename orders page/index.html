<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Orders</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
  font-family:Poppins;
  background:#0f172a;
  color:white;
  padding:20px;
}

h2{
  margin-bottom:20px;
}

.card{
  background:#111827;
  padding:15px;
  border-radius:15px;
  margin-bottom:15px;
}

.status{
  padding:5px 10px;
  border-radius:8px;
  font-size:12px;
  display:inline-block;
  margin-top:5px;
}

.pending{ background:#f59e0b; }
.processing{ background:#3b82f6; }
.delivered{ background:#22c55e; }

button{
  margin-top:10px;
  padding:8px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.process{ background:#3b82f6; color:white; }
.deliver{ background:#22c55e; color:white; }
.back-btn{
  display:flex;
  align-items:center;
  gap:8px;
  padding:10px 14px;
  border:none;
  border-radius:12px;
  background:linear-gradient(135deg,#2563eb,#14b8a6);
  color:white;
  font-family:Poppins, sans-serif;
  font-size:14px;
  cursor:pointer;
  box-shadow:0 6px 15px rgba(0,0,0,0.15);
  transition:0.2s ease;
}

.back-btn i{
  font-size:16px;
}

.back-btn:hover{
  transform:translateX(-3px);
  box-shadow:0 8px 20px rgba(0,0,0,0.25);
}

.back-btn:active{
  transform:scale(0.95);
}


</style>
</head>

<body>
<button class="back-btn" onclick="history.back()">
  <i class="fa-solid fa-arrow-left"></i>
  Back
</button>

<h2>📦 Orders Dashboard</h2>

<div id="orders"></div>
<button class="chat-btn" data-id="${o.id}">
  💬 Chat
</button>



<script>

let orders = JSON.parse(localStorage.getItem("orders")) || [];
const container = document.getElementById("orders");

function render(){

  container.innerHTML = "";

  if(orders.length === 0){
    container.innerHTML = "<p>No orders yet</p>";
    return;
  }

  orders.forEach((o, i) => {

    container.innerHTML += `
      <div class="card">
        <h3>${o.productName}</h3>
        <p>💰 KES ${o.price}</p>
        <p>👤 ${o.buyerName} (${o.buyerPhone})</p>
        <p>🕒 ${o.time}</p>

        <span class="status ${o.status.toLowerCase()}">
          ${o.status}
        </span>

        <br>

        <button class="process" onclick="setStatus(${i}, 'Processing')">Processing</button>
        <button class="deliver" onclick="setStatus(${i}, 'Delivered')">Delivered</button>
      </div>
    `;
  });
}

function setStatus(index, status){
  orders[index].status = status;
  localStorage.setItem("orders", JSON.stringify(orders));
  render();
}

render();
document.addEventListener("click", function(e){
  if(e.target.classList.contains("chat-btn")){
    let orderId = e.target.getAttribute("data-id");
    openChat(orderId);
  }
});
function openChat(orderId){
  localStorage.setItem("activeOrder", orderId);
  window.location.href = "/messages page/index.html";
}

</script>

</body>
</html>
