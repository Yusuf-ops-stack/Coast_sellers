<script>
const sellerId = localStorage.getItem('coastmall_sellers_id');
const savedAccount = localStorage.getItem('sellerMode');

if (!sellerId) {
    //window.location.href = '/sellers/login';
     window.location.assign('/sellers/home')
} else if (!savedAccount) {
    localStorage.setItem('sellerMode', 'demo');
    window.location.href = '/sellers/home/demo';
} else if (savedAccount === 'demo') {
    window.location.href = '/sellers/home/demo';
} else if (savedAccount === 'real') {
    window.location.href = '/sellers/home/real';
}
</script>
