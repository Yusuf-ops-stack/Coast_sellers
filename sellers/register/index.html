<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="/styles/general.css">
  <link rel="stylesheet" href="/styles/general.css">
<title>Seller Registration | Coastmall</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: #f0f0f0;
    padding: 20px;
  }
      * {
  -webkit-tap-highlight-color: transparent;
  -webkit-touch-callout: none;
}
  .container {
    max-width: 400px;
    margin: auto;
    background: #fff;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
  }
  h2 {
    text-align: center;
    margin-bottom: 20px;
  }
  .form-group {
    margin-bottom: 15px;
  }
  label {
    display: block;
    margin-bottom: 5px;
    font-weight: bold;
  }
  input {
    width: 95%;
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 5px;
  }
  button {
    width: 100%;
    padding: 10px;
    background: #28a745;
    color: white;
    border: none;
    border-radius: 5px;
    font-size: 16px;
    cursor: pointer;
  }
  button:hover {
    background: #218838;
  }
  .info {
    margin-top: 10px;
    font-size: 14px;
    text-align: center;
    color: #555;
  }
  .fee-note {
    text-align: center;
    font-size: 14px;
    color: red;
    margin-bottom: 15px;
  }
  .image-upload-preview {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 10px;
  }
  .img-wrapper {
    position: relative;
    width: 100px;
    height: 100px;
    border-radius: 8px;
    overflow: visible;
  }
  .img-wrapper img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 8px;
  }
  .remove-btn {
    display: none;
    position: absolute;
    top: -8px;
    right: -8px;
    background: red;
    color: white;
    border: none;
    border-radius: 50%;
    width: 20px;
    height: 20px;
    justify-content: center;
    align-items: center;
    font-size: 12px;
    cursor: pointer;
  }
  .img-wrapper .remove-btn {
    display: flex;
  }
  .add-image {
    width: 100px;
    height: 100px;
    border: 2px dashed #ccc;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    color: #888;
    border-radius: 8px;
    cursor: pointer;
  }
  .info a{
    text-decoration: dotted;
  }
</style>
</head>
<body>

<div class="container">
  <h2>Register to CoastMall as a Seller</h2>
  <div class="fee-note">Registration Fee: Ksh 0 (Free plan /=) for 1 month</div>

  <form id="sellerForm" enctype="multipart/form-data">
    <div class="form-group">
      <label for="storeName">Store Name</label>
      <input type="text" id="storeName" name="storeName" required placeholder="Create your Store name">
    </div>

    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" required placeholder="Enter your Email">
    </div>

    <div class="form-group">
      <label for="phone">Phone Number</label>
      <input type="tel" id="phone" name="phone" required placeholder="For easy contact with your Buyers">
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" required placeholder="Create New Password">
    </div>

    <div class="form-group">
      <label for="storeLogo">Store Logo</label>
      <input type="file" id="storeLogo" name="storeLogo" accept="image/*" style="display: none;" onchange="handleStoreLogo(event)">
      <div id="logoPreview" class="image-upload-preview">
        <div class="add-image" onclick="document.getElementById('storeLogo').click()">+</div>
      </div>
    </div>

    <button type="submit">Register</button>
  </form>

  <div class="info">
    Already Registered? <a href="/sellers/login/">Login</a>
  </div>
</div>

<script>
document.getElementById('sellerForm').addEventListener('submit', async function (e) {
  e.preventDefault();
  const form = document.getElementById('sellerForm');
  const formData = new FormData(form);

  try {
    const response = await fetch('https://coastmall-api-54fe.vercel.app/register-seller', {
      method: 'POST',
      body: formData
    });
    const result = await response.json();

    if (result.success) {
      alert('Seller Registered Successfully ✅');
      localStorage.setItem('coastmall_seller_uid', result.uid);
      localStorage.setItem('coastmall_sellers_id', result.sellerId);
      localStorage.setItem('storename', formData.get('storeName'));
      localStorage.setItem('sellerMode', 'demo');
      window.location.href = '/sellers/home/demo'; 
    } else {
      alert(result.message);
    }
  } catch (error) {
    alert(error.message);
  }
});

function handleStoreLogo(e) {
  const file = e.target.files[0];
  const logoPreview = document.getElementById('logoPreview');
  logoPreview.innerHTML = '';

  if (file) {
    const reader = new FileReader();
    reader.onload = function (ev) {
      localStorage.setItem('storeLogo', ev.target.result);

      const wrapper = document.createElement("div");
      wrapper.classList.add("img-wrapper");

      const img = document.createElement("img");
      img.src = ev.target.result;

      const removeBtn = document.createElement("button");
      removeBtn.textContent = "×";
      removeBtn.classList.add("remove-btn");
      removeBtn.onclick = () => {
        logoPreview.innerHTML = `<div class="add-image" onclick="document.getElementById('storeLogo').click()">+</div>`;
        document.getElementById('storeLogo').value = '';
        localStorage.removeItem('storeLogo');
      };

      wrapper.appendChild(img);
      wrapper.appendChild(removeBtn);
      logoPreview.appendChild(wrapper);

      // Scroll to preview
      logoPreview.scrollIntoView({ behavior: 'smooth' });
    };
    reader.readAsDataURL(file);
  }
}

// Load preview if previously selected
window.addEventListener("DOMContentLoaded", () => {
  const savedLogo = localStorage.getItem('storeLogo');
  if (savedLogo) {
    const logoPreview = document.getElementById('logoPreview');
    logoPreview.innerHTML = '';

    const wrapper = document.createElement("div");
    wrapper.classList.add("img-wrapper");

    const img = document.createElement("img");
    img.src = savedLogo;

    const removeBtn = document.createElement("button");
    removeBtn.textContent = "×";
    removeBtn.classList.add("remove-btn");
    removeBtn.onclick = () => {
      logoPreview.innerHTML = `<div class="add-image" onclick="document.getElementById('storeLogo').click()">+</div>`;
      document.getElementById('storeLogo').value = '';
      localStorage.removeItem('storeLogo');
    };

    wrapper.appendChild(img);
    wrapper.appendChild(removeBtn);
    logoPreview.appendChild(wrapper);
  }
});
</script>

</body>
</html>
