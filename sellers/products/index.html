<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="/styles/general.css">
  <link rel="stylesheet" href="/styles/general.css">
  <title>My Products | CoastMall Seller</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="/styles/loader.css">
  <script src="/scripts/loader.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
        * {
  -webkit-tap-highlight-color: transparent;
  -webkit-touch-callout: none;
}
    body { font-family: Arial, sans-serif; background: #f5f5f5; padding-bottom: 70px; }
    .container { max-width: 500px; margin: auto; padding: 10px; }

    h2 { margin: 15px 0; color: #333; }

    .product {
      background: white;
      padding: 10px;
      border-radius: 10px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.08);
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .product img {
      width: 80px;
      height: 80px;
      object-fit: cover;
      border-radius: 10px;
      background: #eee;
    }

    .details {
      flex: 1;
    }

    .details h4 {
      font-size: 14px;
      margin-bottom: 5px;
      color: #222;
    }

    .details p {
      font-size: 12px;
      color: #555;
    }

    .actions {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .actions button {
      padding: 4px 8px;
      font-size: 12px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .edit-btn {
      background: #dff0ff;
      color: #007bff;
    }

    .delete-btn {
      background: #ffe5e5;
      color: red;
    }

    .add-btn {
      width: 100%;
      display: block;
      text-align: center;
      margin: 15px 0;
      padding: 10px;
      background: red;
      color: white;
      font-weight: bold;
      border: none;
      border-radius: 8px;
      text-decoration: none;
    }

    /* Bottom Nav */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: #fff;
      border-top: 1px solid #ddd;
      display: flex;
      justify-content: space-around;
      padding: 8px 0;
      box-shadow: 0 -1px 6px rgba(0, 0, 0, 0.05);
      z-index: 999;
    }

    .nav-item {
      text-align: center;
      flex: 1;
      color: #555;
      font-size: 12px;
      text-decoration: none;
      cursor: pointer;
    }

    .nav-item i {
      font-size: 18px;
    }

    .nav-item p {
      margin-top: 2px;
      font-size: 10px;
    }

    .nav-item.active i, .nav-item.active p {
      color: red;
      font-weight: bold;
    }

    .home-btn {
      position: relative;
      top: -10px;
    }

   .home-circle {
      width: 45px;
      height: 45px;
      background: red;
      color: #fff;
      border-radius: 50%;
      margin: auto;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 20px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
     .container {
  animation: slideIn 0.5s ease-in-out;
}

@keyframes slideIn {
  from {
    transform: translateY(100%);
    opacity: 0;
  }
  to {
    transform: translateY(0);
    opacity: 1;
  }
}
#error{
  text-align: center;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 13px;
}
  </style>
</head>
<body>

  <div class="container">
    <h2>My Products</h2>

    <!-- Example product -->
    <div class="product">
      <div id="error">Fetching...</div>
    </div>

    <!-- Add more product blocks dynamically here -->

    <a href="/sellers/upload/index.html" class="add-btn">+ Add New Product</a>
  </div>

 <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <a class="nav-item" href="/sellers/home/" onclick="load()">
      <i class="fa-solid fa-shop"></i>
      <p>Home</p>
    </a>
    <a class="nav-item" href="/sellers/messages/" onclick="load()">
      <i class="fa-regular fa-envelope"></i>
      <p>Messages</p>
    </a>
    <a class="nav-item home-btn " href="/sellers/products/" onclick="load()">
      <div class="home-circle">
        <i class="fa-solid fa-store"></i>
      </div>
      <p>My Products</p>
    </a>
    <a class="nav-item" href="/sellers/orders/" onclick="load()">
      <i class="fa-solid fa-bag-shopping"></i>
      <p>Orders</p>
    </a>
    <a class="nav-item" href="/sellers/profile/" onclick="load()">
      <i class="fa-solid fa-user"></i>
      <p>Profile</p>
    </a>
  </nav>


          <!-- Stick Spinner Loader -->
          <div class="loader-holder">
            <div class="loader" id="loader">
              <div class="stick"></div>
              <div class="stick"></div>
              <div class="stick"></div>
              <div class="stick"></div>
              <div class="stick"></div>
              <div class="stick"></div>
              <div class="stick"></div>
              <div class="stick"></div>
      
            </div>
          </div>

   <!-- Overlay -->
<div class="overlay" id="overlay">
</div> 

</body>
<script>
const storeId = localStorage.getItem('coastmall_sellers_id');

async function loadStoreData() {
  if (!storeId) {
    document.getElementById('error').innerText = "No store ID found.";
    return;
  }

  try {
    const storeRes = await fetch('https://coastmall-api-54fe.vercel.app/stores');
    const stores = await storeRes.json();
    const store = stores.find(s => String(s.sellerId) === String(storeId));

    if (!store) {
      document.getElementById('error').innerText = "Store not found.";
      return;
    }

    const productRes = await fetch('https://coastmall-api-54fe.vercel.app/products');
    const allProducts = await productRes.json();

    const storeProducts = allProducts.filter(prod => String(prod.storeNumber) === String(storeId));
    renderProducts(storeProducts);
  } catch (err) {
    console.error(err);
    document.getElementById('error').innerText = "Failed to load store data.";
  }
}

function renderProducts(products) {
  const container = document.querySelector('.container');
  const errorDiv = document.getElementById('error');
  //container.querySelectorAll('.product').forEach(p => p.remove()); // clear old

  if (products.length === 0) {
    errorDiv.innerText = "No Products Added yet";
    errorDiv.style.display = "flex";
    return;
  }

  errorDiv.style.display = "none";

  products.forEach(prod => {
    const div = document.createElement('div');
    div.className = 'product';
    div.innerHTML = `
      <img src="${prod.img}" alt="Product">
      <div class="details">
        <h4>${prod.title}</h4>
        <p>KSh ${prod.price}<br>Stock: ${prod.stock || 'N/A'}</p>
      </div>
      <div class="actions">
        <button class="edit-btn">Edit</button>
        <button class="delete-btn">Delete</button>
      </div>
    `;

    // Attach DELETE logic
    div.querySelector('.delete-btn').addEventListener('click', async () => {
      if (!confirm(`Are you sure you want to delete this Product "${prod.title}" completely?`)) return;

      try {
          const res = await fetch(`https://coastmall-api-54fe.vercel.app/products/${prod.id}`, {
            method: 'DELETE'
          });


        if (res.ok) {
          div.remove(); // remove from UI
          if (document.querySelectorAll('.product').length === 0) {
            errorDiv.innerText = "No Products Added yet";
            errorDiv.style.display = "block";
          }
        } else {
          alert("Failed to delete product.");
        }
      } catch (err) {
        console.error(err);
        alert("Error deleting product.");
      }
    });

    container.insertBefore(div, document.querySelector('.add-btn'));
  });
}

loadStoreData();
</script>


</html>
