<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="/styles/general.css">
  <link rel="stylesheet" href="/styles/general.css">
  <link rel="stylesheet" href="/styles/loader.css">
  <script src="/scripts/loader.js"></script>
  <title>Post Product | Coastmall</title>
<style>
    :root {
      --primary: #007bff;
      --primary-dark: #0056b3;
      --bg: #f9fafb;
      --card-bg: #fff;
      --text-dark: #333;
      --text-light: #666;
      --radius: 12px;
      --shadow: 0 4px 15px rgba(0,0,0,0.08);
    }
    * {
  -webkit-tap-highlight-color: transparent;
  -webkit-touch-callout: none;
}
    body {
      font-family: "Segoe UI", Arial, sans-serif;
      margin: 0;
      padding: 40px 15px;
      background: var(--bg);
      color: var(--text-dark);
    }

    .container {
      max-width: 900px;
      margin: auto;
      background: var(--card-bg);
      padding: 30px;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      animation: fadeIn 0.4s ease-in-out;
    }

    h2 {
      text-align: center;
      margin-bottom: 25px;
      font-size: 1.7rem;
      color: var(--primary-dark);
    }

    h3 {
      margin: 25px 0 10px;
      font-size: 1rem;
      color: var(--primary);
      border-left: 4px solid var(--primary);
      padding-left: 8px;
    }

    form {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px 25px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    label {
      font-weight: 600;
      font-size: 0.9rem;
      color: var(--text-dark);
    }

    input, select, textarea {
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: var(--radius);
      background: #fafafa;
      font-size: 0.95rem;
      transition: 0.2s ease;
    }

    input:focus, select:focus, textarea:focus {
      border-color: var(--primary);
      outline: none;
      background: #fff;
      box-shadow: 0 0 0 3px rgba(0,123,255,0.15);
    }

    /* Full-width fields (span across both columns) */
    .full-width {
      grid-column: span 2;
    }

    button {
      grid-column: span 2;
      padding: 15px;
      border: none;
      border-radius: var(--radius);
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 18px rgba(0,123,255,0.3);
    }

    /* Image upload previews */
    .image-upload-preview {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 10px;
    }

    .img-wrapper {
      position: relative;
      width: 120px;
      background: #fafafa;
      padding: 10px;
      border: 1px solid #eee;
      border-radius: var(--radius);
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: 0.2s ease;
    }

    .img-wrapper:hover {
      transform: scale(1.03);
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .img-wrapper img {
      width: 100%;
      height: 100px;
      object-fit: cover;
      border-radius: var(--radius);
    }

    .remove-btn {
      position: absolute;
      top: -8px;
      right: -8px;
      background: crimson;
      color: white;
      border: none;
      border-radius: 50%;
      width: 22px;
      height: 22px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 14px;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
      transition: 0.2s;
    }

    .remove-btn:hover {
      background: darkred;
    }

    .add-image {
      width: 120px;
      height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px dashed #bbb;
      border-radius: var(--radius);
      font-size: 28px;
      color: #888;
      cursor: pointer;
      transition: 0.2s;
    }

    .add-image:hover {
      border-color: var(--primary);
      color: var(--primary);
      background: #f0f8ff;
    }

    .img-wrapper input {
      display: block;
      width: 100%;
      margin-top: 8px;
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 0.85rem;
    }

    /* Mobile */
    @media (max-width: 768px) {
      form {
        grid-template-columns: 1fr;
      }
      .full-width, button {
        grid-column: span 1;
      }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Post a Product</h2>
    <form id="productForm">
<div class="form-group full-width">
  <label for="cover">Cover Image</label>
  <input type="file" id="cover" accept="image/*" style="display: none;" onchange="handleCoverImage(event)">
  <div id="coverPreview" class="image-upload-preview">
    <div class="add-image" onclick="document.getElementById('cover').click()">+</div>
  </div>
</div>

<h3 style="margin-top: 20px;font-size: 12px;">Varieties</h3>
<div class="form-group full-width">
  <input type="file" id="varieties" multiple accept="image/*" style="display: none;" onchange="handleVarieties(event)">
  <div class="image-upload-preview" id="varietyPreview">
    <div class="add-image" onclick="document.getElementById('varieties').click()">+</div>
  </div>
</div>


      <div class="form-group">
        <label for="productName">Product Name</label>
        <input type="text" id="productName" name="productName" maxlength="200" required>
      </div>

      <div class="form-group">
  <label for="category">Category</label>
<select id="category" name="category" required>
  <option value="">-- Select Category --</option>
  <option value="food">Food</option>
  <option value="fashion">Fashion</option>
  <option value="electronics">Electronics</option>
  <option value="beauty">Beauty</option>
</select>

</div>
<div class="form-group">
  <label for="oldPrice">Old Price (optional)</label>
  <input type="number" id="oldPrice" name="oldPrice" placeholder="e.g. 1000">
</div>
  <div class="form-group">
        <label for="price">New Price (KSh)</label>
        <input type="number" id="price" name="price" placeholder="e.g. 600 (Show some discount for customer attraction)" required>
      </div>
 <div class="form-group">
        <label for="inventory">In Stock</label>
        <input type="number" id="inventory" name="inventory" placeholder="Total Product in stock" required>
      </div>

<div class="form-group">
  <label for="payment">Payment Method</label>
  <select id="payment" name="payment" required>
    <option value="">-- Select Payment Method --</option>
    <option value="Mpesa">M-PESA</option>
  </select>
</div>
  <div class="form-group">
        <label for="description">Product Detail Description</label>
        <textarea id="description" name="description" rows="4" required></textarea>
      </div>

      <div class="form-group">
        <label for="shipping">Shipping Information/Address</label>
        <textarea id="shipping" name="shipping" rows="2" placeholder="e.g Bomani" required></textarea>
      </div>
       
      <div id="foodExtras" style="display: none;">

  <h3 style="margin-top: 20px;">🍽️ Food Details</h3>

  <div class="form-group">
    <label for="ingredients">Main Ingredients</label>
    <textarea id="ingredients" name="ingredients" rows="3" placeholder="e.g. Flour, Cheese, Tomato..." required></textarea>
  </div>

  <div class="form-group">
    <label for="prepTime">Preparation Time (in minutes)</label>
    <input type="number" id="prepTime" name="prepTime" placeholder="e.g. 25" required>
  </div>

  <div class="form-group">
    <label for="servings">Serving Size / Quantity</label>
    <input type="text" id="servings" name="servings" placeholder="e.g. 1 large pizza" required>
  </div>

  <div class="form-group">
    <label for="veg">Is this Vegetarian?</label>
    <select id="veg" name="veg" required>
      <option value="">-- Select Option --</option>
      <option value="Yes">Yes</option>
      <option value="No">No</option>
    </select>
  </div>

</div>

      <button type="submit">Publish</button>
    </form>
  </div>

  
          <!-- Stick Spinner Loader -->
          <div class="loader-holder">
            <div class="loader" id="loader">
              <div class="stick"></div>
              <div class="stick"></div>
              <div class="stick"></div>
              <div class="stick"></div>
              <div class="stick"></div>
              <div class="stick"></div>
              <div class="stick"></div>
              <div class="stick"></div>
      
            </div>
          </div>

   <!-- Overlay -->
<div class="overlay" id="overlay">
</div> 

</body>
</html>

 <script>
function handleCoverImage(e) {
  const file = e.target.files[0];
  const coverPreview = document.getElementById('coverPreview');
  coverPreview.innerHTML = '';

  if (file) {
    const reader = new FileReader();
    reader.onload = function (ev) {
      localStorage.setItem('coverPreview', ev.target.result);
      const wrapper = document.createElement("div");
      wrapper.classList.add("img-wrapper");

      const img = document.createElement("img");
      img.src = ev.target.result;

      const removeBtn = document.createElement("button");
      removeBtn.textContent = "×";
      removeBtn.classList.add("remove-btn");
      removeBtn.onclick = () => {
        coverPreview.innerHTML = `<div class="add-image" onclick="document.getElementById('cover').click()">+</div>`;
        document.getElementById('cover').value = '';
        localStorage.removeItem('coverPreview');
      };

      wrapper.appendChild(img);
      wrapper.appendChild(removeBtn);
      coverPreview.appendChild(wrapper);
    };
    reader.readAsDataURL(file);
  }
}

function handleVarieties(e) {
  const files = e.target.files;
  const preview = document.getElementById("varietyPreview");

  const savedVarieties = JSON.parse(localStorage.getItem('varieties') || "[]");

  Array.from(files).forEach((file, index) => {
    const reader = new FileReader();
    reader.onload = function (event) {
      createVarietyWrapper(event.target.result, preview);
    };
    reader.readAsDataURL(file);
  });

  e.target.value = '';
}

function createVarietyWrapper(src, preview) {
  const wrapper = document.createElement("div");
  wrapper.classList.add("img-wrapper");

  const img = document.createElement("img");
  img.src = src;

  const removeBtn = document.createElement("button");
  removeBtn.textContent = '×';
  removeBtn.classList.add('remove-btn');
  removeBtn.onclick = () => {
    wrapper.remove();
    const current = JSON.parse(localStorage.getItem('varieties') || "[]");
    const updated = current.filter(x => x !== src);
    localStorage.setItem('varieties', JSON.stringify(updated));
  };

  const labelInput = document.createElement("input");
  labelInput.type = "text";
  labelInput.name = `label${Date.now()}`;
  labelInput.placeholder = "Name (e.g. Red)";
  labelInput.required = true;

  const priceInput = document.createElement("input");
  priceInput.type = "number";
  priceInput.name = `price${Date.now()}`;
  priceInput.placeholder = "Price (e.g. 450)";
  priceInput.required = true;

  wrapper.appendChild(img);
  wrapper.appendChild(removeBtn);
  wrapper.appendChild(labelInput);
  wrapper.appendChild(priceInput);
  preview.insertBefore(wrapper, preview.querySelector(".add-image"));
}

document.getElementById('productForm').addEventListener('submit', async function (e) {
  e.preventDefault();

  const form = e.target;
  const formData = new FormData(form);
  const prod_id = localStorage.getItem('coastmall_sellers_id');
  formData.append("prod_id", prod_id || "anonymous");

  const coverImg = document.querySelector('#coverPreview img');
  if (!coverImg) return alert("Please upload a cover image.");

  const coverBlob = await (await fetch(coverImg.src)).blob();
  formData.append("coverImage", coverBlob, 'cover.jpg');

  const varietyWrappers = document.querySelectorAll('#varietyPreview .img-wrapper');

  if (!varietyWrappers.length) return alert("Please upload at least one variety image.");

  for (let i = 0; i < varietyWrappers.length; i++) {
    const wrapper = varietyWrappers[i];
    const img = wrapper.querySelector("img");
    const label = wrapper.querySelector("input[name^='label']");
    const price = wrapper.querySelector("input[name^='price']");

    if (!img || !label || !price) continue;

    const blob = await (await fetch(img.src)).blob();
    formData.append("images", blob, `variety${i}.jpg`);
    formData.append(`label${i}`, label.value.trim());
    formData.append(`price${i}`, price.value.trim());
  }

  try {
    const res = await fetch("https://coastmall-api-54fe.vercel.app/upload-product", {
      method: "POST",
      body: formData
    });

    const data = await res.json();
    if (data.success) {
      alert("✅ Product structured & uploaded!");
      form.reset();
      document.getElementById("coverPreview").innerHTML = `<div class="add-image" onclick="document.getElementById('cover').click()">+</div>`;
      document.getElementById("varietyPreview").innerHTML = `<div class="add-image" onclick="document.getElementById('varieties').click()">+</div>`;
      localStorage.removeItem('productDraft');
      localStorage.removeItem('coverPreview');
      localStorage.removeItem('varieties');
      window.location.assign('/sellers/home');
    } else {
      alert("❌ Upload failed.");
    }
  } catch (err) {
    console.error(err);
    alert("🚨 Upload error.");
  }
});

// Toggle food extras
function toggleFoodFields(category) {
  const isFood = category.toLowerCase().includes('food');
  const foodExtras = document.getElementById("foodExtras");
  foodExtras.style.display = isFood ? 'block' : 'none';

  const requiredFields = foodExtras.querySelectorAll("[required]");
  requiredFields.forEach(field => {
    if (isFood) {
      field.setAttribute("required", "required");
    } else {
      field.removeAttribute("required");
    }
  });
}

// Save form data to localStorage
document.getElementById('productForm').addEventListener('input', () => {
  const formData = new FormData(document.getElementById('productForm'));
  const data = {};

  for (let [key, value] of formData.entries()) {
    data[key] = value;
  }

  localStorage.setItem('productDraft', JSON.stringify(data));
});

// Load everything on page ready
window.addEventListener("DOMContentLoaded", () => {
  const categorySelect = document.getElementById('category');
  categorySelect.addEventListener("change", () => {
    toggleFoodFields(categorySelect.value);
  });

  const saved = localStorage.getItem("productDraft");
  if (saved) {
    const data = JSON.parse(saved);
    for (let key in data) {
      const el = document.querySelector(`[name="${key}"]`);
      if (el) el.value = data[key];
    }
    toggleFoodFields(data.category || '');
  }

  // Load cover
  const savedCover = localStorage.getItem('coverPreview');
  if (savedCover) {
    const coverPreview = document.getElementById('coverPreview');
    coverPreview.innerHTML = '';
    const wrapper = document.createElement("div");
    wrapper.classList.add("img-wrapper");

    const img = document.createElement("img");
    img.src = savedCover;

    const removeBtn = document.createElement("button");
    removeBtn.textContent = "×";
    removeBtn.classList.add("remove-btn");
    removeBtn.onclick = () => {
      coverPreview.innerHTML = `<div class="add-image" onclick="document.getElementById('cover').click()">+</div>`;
      document.getElementById('cover').value = '';
      localStorage.removeItem('coverPreview');
    };

    wrapper.appendChild(img);
    wrapper.appendChild(removeBtn);
    coverPreview.appendChild(wrapper);
  }

  // Load variety images
  const savedVarietyImgs = JSON.parse(localStorage.getItem('varieties') || "[]");
  const preview = document.getElementById("varietyPreview");
  savedVarietyImgs.forEach((src) => {
    createVarietyWrapper(src, preview);
  });
});
</script>
