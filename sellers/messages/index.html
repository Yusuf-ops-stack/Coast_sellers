<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="/styles/general.css">
  <link rel="stylesheet" href="/styles/general.css">
  <title>Messages | CoastMall Seller</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="/styles/loader.css">
  <script src="/scripts/loader.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
        * {
  -webkit-tap-highlight-color: transparent;
  -webkit-touch-callout: none;
}
    body { font-family: Arial, sans-serif; background: #f5f5f5; padding-bottom: 70px; }

    .container {
      max-width: 500px;
      margin: auto;
      padding: 15px;
    }

    h2 {
      margin-bottom: 15px;
      color: #333;
    }

    .message-card {
      background: white;
      padding: 10px;
      border-radius: 10px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.08);
      margin-bottom: 15px;
      display: flex;
      gap: 10px;
    }

    .message-icon {
      background: #eee;
      width: 45px;
      height: 45px;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 20px;
      color: #666;
    }

    .message-content {
      flex: 1;
    }

    .message-content h4 {
      font-size: 14px;
      margin-bottom: 3px;
      color: #222;
    }

    .message-content p {
      font-size: 12px;
      color: #555;
      line-height: 1.4;
    }

    .message-content .timestamp {
      font-size: 10px;
      color: #aaa;
      margin-top: 5px;
    }

    /* Bottom Nav */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: #fff;
      border-top: 1px solid #ddd;
      display: flex;
      justify-content: space-around;
      padding: 8px 0;
      box-shadow: 0 -1px 6px rgba(0, 0, 0, 0.05);
      z-index: 999;
    }

    .nav-item {
      text-align: center;
      flex: 1;
      color: #555;
      font-size: 12px;
      text-decoration: none;
      cursor: pointer;
    }

    .nav-item i {
      font-size: 18px;
    }

    .nav-item p {
      margin-top: 2px;
      font-size: 10px;
    }

    .nav-item.active i, .nav-item.active p {
      color: red;
      font-weight: bold;
    }

    .home-btn {
      position: relative;
      top: -10px;
    }

    .home-circle {
      width: 45px;
      height: 45px;
      background: black;
      color: #fff;
      border-radius: 50%;
      margin: auto;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 20px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    .container {
  animation: slideIn 0.3s ease-in-out;
}

@keyframes slideIn {
  from {
    transform: translateX(-100%);
    opacity: 0;
  }
  to {
    transform: translateX(0);
    opacity: 1;
  }
}
  </style>
</head>
<body>

  <div class="container">
    <h2>Messages</h2>

    <!-- Example message -->
    <div class="message-card" id="msg">
    </div>

  </div>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <a class="nav-item" href="/sellers/home/" onclick="load()">
      <i class="fa-solid fa-shop"></i>
      <p>Home</p>
    </a>
    <a class="nav-item active" href="/sellers/messages/" onclick="load()">
      <i class="fa-regular fa-envelope"></i>
      <p>Messages</p>
    </a>
    <a class="nav-item home-btn" href="/sellers/products/" onclick="load()">
      <div class="home-circle">
        <i class="fa-solid fa-store"></i>
      </div>
      <p>My Products</p>
    </a>
    <a class="nav-item" href="/sellers/orders/" onclick="load()">
      <i class="fa-solid fa-bag-shopping"></i>
      <p>Orders</p>
    </a>
    <a class="nav-item" href="/sellers/profile/" onclick="load()">
      <i class="fa-solid fa-user"></i>
      <p>Profile</p>
    </a>
  </nav>

  
          <!-- Stick Spinner Loader -->
          <div class="loader-holder">
            <div class="loader" id="loader">
              <div class="stick"></div>
              <div class="stick"></div>
              <div class="stick"></div>
              <div class="stick"></div>
              <div class="stick"></div>
              <div class="stick"></div>
              <div class="stick"></div>
              <div class="stick"></div>
      
            </div>
          </div>

   <!-- Overlay -->
<div class="overlay" id="overlay">
</div> 
</body>
<script>
  const msg = document.getElementById('msg');
  if(! localStorage.getItem('messages')){
    msg.style.fontSize='12px'
    msg.textContent="You have no messages yet !"
  }else{
    msg.innerHTML=`
         <div class="message-icon">
        <i class="fa fa-user"></i>
      </div>
      <div class="message-content">
        <h4>Fatuma Mwinyi</h4>
        <p>Hi! Is the Rashnik Blender still available? I want 2.</p>
        <div class="timestamp">10 mins ago</div>
      </div>
    `
  }
</script>
</html>
